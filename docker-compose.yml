services:
#---------------
# NGINX - 
#----------------
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8443:443"
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ${DATA_PATH}/nginx/ssl:/etc/nginx/ssl:ro #ro c'est pour read-only
    depends_on:
      - frontend
      - backend
    networks:
      - transcendance

#---------------
# BACKEND - Fastify
#---------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: backend
    restart: unless-stopped
    environment:
      - VAULT_TOKEN=${VAULT_TOKEN}
      - VAULT_ADDR=${VAULT_ADDR}
    expose:
      - "3001"
    depends_on:
      - db
      - vault
    volumes:
      - ./backend/src:/app/src
      - ./backend/server.js:/app/server.js
    networks:
      - transcendance
  
#---------------
# FRONTEND - React/Vite
#---------------
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: frontend
    restart: unless-stopped
    expose:
      - "5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    networks:
      - transcendance

#---------------
# DB - 
#---------------
  db:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - transcendance

#-------------
# VAULT
#-----------------
  vault:
    image: hashicorp/vault:latest
    container_name: vault
    restart: unless-stopped
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_TOKEN}
      - VAULT_DEV_LISTEN_ADRESS=0.0.0.0:8200
    expose:
      - "8200"
    networks:
      - transcendance


#----------------------
# PGADMIN
#------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    networks:
      - transcendance


#__________________________VOLUMES 
volumes:   
  db-data:
  
networks:
  transcendance:
    name: transcendance 
    driver: bridge #network driver        #no specific filesystem type
