services:
#---------------
# NGINX - 
#----------------
  nginx:
    image: owasp/modsecurity-crs:nginx-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8443:443"
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/templates/conf.d/default.conf.template
      - ${DATA_PATH}/nginx/ssl:/etc/nginx/ssl:ro #ro c'est pour read-only
    depends_on:
      - frontend
      - backend
    environment:
      - PARANOIA=2                  #level max des regles possibles
      - BLOCKING_PARANOIA=2         #level max des regles used - peut pas etre <PARANOIA
      #Pour savoir si on applique les regles, si on regarde juste ou pas du tout 
      - MODSEC_RULE_ENGINE=Off
      #- MODSEC_RULE_ENGINE = DetectionOnly
      #- MODSEC_RULE_ENGINE = Off
      - ANOMALY_INBOUND=5         #score max pour qualifier une requete entrante comme invalide
      - ANOMALY_OUTBOUND=5      #score max pour qualifier une requete sortante comme invalide
    networks:
      - transcendance

#---------------
# BACKEND - Fastify
#---------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: backend
    restart: unless-stopped
    environment:
      - VAULT_CACERT=/vault/tls/vault.crt
      - NODE_EXTRA_CA_CERTS=/vault/tls/vault.crt
      - VAULT_ADDR=${VAULT_ADDR}
    expose:
      - "3001"
    depends_on:
      - db
      - vault
    volumes:
      - ${DATA_PATH}/vault/tls:/vault/tls:ro
      - ${DATA_PATH}/vault/init:/vault/init:ro
    networks:
      - transcendance
  
#---------------
# FRONTEND - React/Vite
#---------------
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: frontend
    restart: unless-stopped
    expose:
      - "5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    networks:
      - transcendance

#---------------
# DB - 
#---------------
  db:
    image: public.ecr.aws/docker/library/postgres:16.13-alpine3.23
    ports:
      - ${POSTGRES_PORT}:5432 
    container_name: db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - transcendance


  vault:
    image: hashicorp/vault:1.18.3
    container_name: vault
    restart: unless-stopped
    environment:
      - VAULT_ADDR=http://127.0.0.1:8200
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PEPPER=${PEPPER}
      - JWT_SECRET=${JWT_SECRET} 
      - COOKIE_SECRET=${COOKIE_SECRET}
    volumes:
      - ./vault/entrypoint.sh:/entrypoint.sh:ro
      - ./vault/config.hcl:/vault/config.hcl:ro
      - ${DATA_PATH}/vault/data:/vault/data
      - ${DATA_PATH}/vault/tls:/vault/tls:ro
      - ${DATA_PATH}/vault/init:/vault/init
    entrypoint: ["sh", "/entrypoint.sh"]
    expose:
      - "8200"
    networks:
      - transcendance

#__________________________VOLUMES 
volumes:   
  db-data:
  node_modules:
  
networks:
  transcendance:
    name: transcendance 
    driver: bridge #network driver        #no specific filesystem type
