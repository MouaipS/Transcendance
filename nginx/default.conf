##Pour rediriger les requests HTTP vers HTTPS

server{  
	listen 80;
	server_name localhost;

	server_tokens off; #pour supprimer la version Nginx en cas de curl (curl -skI https://localhost:8443/)	
	return 301 https://$host:8443$request_uri; 
}

## Gestion des requetes HTTPS

server{
	listen 443 ssl;
	server_name localhost;

	#pour supprimer la version de Nginx en cas de curl (curl -skI https://localhost:8443/)	
	server_tokens off;

	#Pour empecher le "iframe", chargé le site sur un autre site - c'est pour le clickjacking. On peut aussi mettre SAMEORIGIN pour l'autoriser sur notre site mais pas d'interet je pense
	# le always c'est pour qu'il  ajoute le headers sur toutes les requetes, pas que les 200
	add_header X-Frame-Options "DENY" always; 

	#Pour empecher le sniffing par le navigateur, on lui dit de faire confiance au MIME
	add_header X-Content-Type-Options "nosniff" always;

	#Pour empecher les injections XXS
		#default-src 'self' => Toutes les injections et les downloads/upload viennent uniquement du site, jamais vers l'exterieur de la whitelist
		#script-src 'self' 'unsafe-inline' 'unsafe-eval' => bloque directement le XSS, vient du site, autorise les instructions inline et l'utilisation de eval
		#style-src => pareil mais pour le css/tailwind, gestion des polices aussi (celles ici ont été utilisées par le front à l'instant T de l'ecriture) # TODO si nouvelle police => update
		#img-src 'self' data: blob: => origine des images (data pour URI et blob pour images JS) est toujours le site
		#connect-src 'self' ws: wss: =>Les requêtes sortantes (fetch, WebSocket) peuvent aller vers mon domaine ou vers n'importe quel WebSocket. ws: et wss: pour le hot reload Vite et pour le jeu.
		#frame-ancestors 'none' =>Version moderne du X-Frame-Options
	# TODO changer ça pour la prod, pas de unsafe si plus de vite dev
	add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;

	#HSTS il dit en gros de toujours passé par le https, meme en cas de redirection depuis http il te dit que la redirection est obligatoirement sur du https
	#Le temps correponds à la periode ou le navigateur doit se souvenir de la regle HSTS.
	add_header Strict-Transport-Security "max-age=150" always;

	#Quand on clique sur un lien depuis notre site vers un site externe, la requete contient un header Referer qui contient l'url complete de la page d'ou on vient. Il peut donc recevoir un token de securité. Si ce site externe est down, alors le token est compromis.
	# strict-origin-when-origin permet d'envoyer seulement le domaine dans la requete
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;

	ssl_certificate /etc/nginx/ssl/certificat_transcendence.crt;
	ssl_certificate_key /etc/nginx/ssl/certificat_transcendence.key;
	ssl_protocols TLSv1.2 TLSv1.3;

	#pour le backend
	location /api/ {
		proxy_http_version 1.1;
		proxy_set_header Connection "";
		proxy_pass http://backend:3001;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header Cookie $http_cookie;
		proxy_pass_header Set-Cookie;
    	# proxy_cookie_path / "/; SameSite=Strict; Secure; HttpOnly";

		add_header Access-Control-Allow-Origin "https://localhost:8443" always;
    	add_header Access-Control-Allow-Credentials "true" always;
	}

	#pour le front
	location / {
		proxy_pass http://frontend:5173;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
	
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
	}

	#pour le hot reload de Vite
	#Quand il y a un changement de fichier detecté par Vite, il redirige l'information vers le front via websocket
	location /ws {
		proxy_pass http://frontend:5173;
		#proxy_pass http://backend:3001;
	}
}
